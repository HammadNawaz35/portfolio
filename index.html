<script>
(function(){
    var bar=document.getElementById('loading-bar'),pct=document.getElementById('loading-pct'),screen=document.getElementById('loading-screen');
    function set(p){bar.style.width=p+'%';pct.textContent=p+'%';}
    var steps=[20,45,65,80,92],si=0,delays=[60,100,150,200,250];
    function run(){if(si<steps.length){setTimeout(function(){set(steps[si]);si++;run();},delays[si]||200);}}
    run();
    window.addEventListener('load',function(){
        setTimeout(function(){
            set(100);
            setTimeout(function(){screen.style.opacity='0';screen.style.visibility='hidden';setTimeout(function(){screen.remove();},600);},450);
        },150);

})();

const ScrollButton=()=>{
    const [visible,setVisible]=useState(false);
    const [direction,setDirection]=useState('down');
    useEffect(()=>{
        const h=()=>{const s=window.scrollY,wh=window.innerHeight,dh=document.documentElement.scrollHeight;setVisible(s>300);setDirection(s+wh>=dh-100?'up':'down');};
        window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h);
    },[]);
    const handleClick=()=>direction==='down'?window.scrollBy({top:window.innerHeight,behavior:'smooth'}):window.scrollTo({top:0,behavior:'smooth'});
    return(
        <div className={`scroll-button ${visible?'visible':''}`} onClick={handleClick}>
            <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" style={{transform:direction==='up'?'rotate(180deg)':'none',transition:'transform .3s'}}>

};

/* ── TYPING ── */
const TypingAnimation=()=>{
    const [text,setText]=useState('');
    const [isDeleting,setIsDeleting]=useState(false);
    const [loopNum,setLoopNum]=useState(0);
    const [typingSpeed,setTypingSpeed]=useState(150);
    const roles=['Android Developer','Frontend Developer','IT Manager','Computer Science Graduate'];
    useEffect(()=>{
        const currentRole=roles[loopNum%roles.length];
        const handle=()=>{
            if(isDeleting){setText(currentRole.substring(0,text.length-1));setTypingSpeed(50);}
            else{setText(currentRole.substring(0,text.length+1));setTypingSpeed(150);}
            if(!isDeleting&&text===currentRole)setTimeout(()=>setIsDeleting(true),2000);
            else if(isDeleting&&text===''){setIsDeleting(false);setLoopNum(loopNum+1);}
        };
        const t=setTimeout(handle,typingSpeed);return()=>clearTimeout(t);
    },[text,isDeleting,loopNum,typingSpeed]);
    return <span className="typing-text text-primary text-xl md:text-2xl font-display font-semibold">{text}</span>;
};

<h2>Why Concurrency Matters More Than Ever</h2>
<p>Modern Android applications are fundamentally concurrent. At any given moment, your app may be executing a network request, querying a local database, processing sensor data, rendering a complex UI, and responding to user input — all simultaneously, all while maintaining a perfectly smooth 60fps (or 120fps on current flagships). Getting this right is not optional. The Android system will kill applications that perform blocking work on the main thread. Your users will abandon apps that feel sluggish or unresponsive. Concurrency is the foundation on which every high-quality Android app is built.</p>
<p>Kotlin Coroutines, introduced to Android as a recommended approach in 2018 and now deeply integrated into the Jetpack ecosystem, provide the most ergonomic, safe, and testable concurrency model Android has ever had. But coroutines are also one of the most consistently misunderstood parts of the Android stack. This article is a comprehensive, no-shortcuts guide to understanding and applying them correctly.</p>

<h2>The Conceptual Foundation: Suspension, Not Blocking</h2>
<p>The core concept behind coroutines is <strong>cooperative multitasking through suspension</strong>. A suspending function can pause its execution at a suspension point — freeing the thread for other work — and resume later when its result is ready. This is critically different from blocking, where the thread sits idle waiting for a result.</p>
<p>A common mental model that helps: imagine a chef who puts a dish in the oven and immediately starts preparing the next dish rather than standing in front of the oven waiting. The chef (thread) is always doing useful work. The dish (coroutine) is suspended, waiting for its condition (timer) to complete. When the timer goes off, the chef returns to finish the dish. This is the efficiency model of coroutines.</p>
<blockquote>A coroutine is not a thread. It is a suspendable computation — a lightweight unit of work that can be suspended and resumed without blocking the OS thread it runs on.</blockquote>

<h2>Structured Concurrency: The Safety Net You Must Understand</h2>
<p>The most important concept in production coroutine usage is <strong>structured concurrency</strong>. The core rule: every coroutine must have a parent scope, and the lifecycle of child coroutines is bound to the lifecycle of their parent. When the parent scope is cancelled, all children are cancelled. This simple rule eliminates an entire category of concurrency bugs that plagued callback-based and RxJava-based Android code: leaked coroutines that outlive their associated UI component and crash the app or corrupt state.</p>
<p>In practice, this means always launching coroutines from a scope with an appropriate lifecycle: <code>viewModelScope</code> for ViewModel-bound coroutines (cancelled when ViewModel is cleared), <code>lifecycleScope</code> for Fragment/Activity-bound coroutines (cancelled when the lifecycle owner is destroyed), and custom scopes with explicit cancellation for long-running background operations.</p>

<h2>Dispatchers: Choosing the Right Thread Context</h2>
<p>Coroutines run on <strong>Dispatchers</strong> — abstractions over thread pools that control which thread or thread pool executes a given piece of code. Choosing the right dispatcher is fundamental to both correctness and performance.</p>
<ul>
<li><strong><code>Dispatchers.Main</code></strong> — The main/UI thread. All UI updates must happen here. Never perform blocking I/O on this dispatcher.</li>
<li><strong><code>Dispatchers.IO</code></strong> — Backed by a large, elastic thread pool optimized for I/O operations (network, disk). Designed for blocking I/O calls that you cannot avoid.</li>
<li><strong><code>Dispatchers.Default</code></strong> — Backed by a thread pool sized to the number of CPU cores. For CPU-intensive work: parsing, sorting, encryption.</li>
<li><strong><code>Dispatchers.Unconfined</code></strong> — Runs in the calling thread until the first suspension point. Rarely used in production code; primarily for testing.</li>
</ul>

<h2>Kotlin Flow: Reactive Streams Done Right</h2>
<p>While coroutines handle single asynchronous values elegantly, real applications often need to handle <em>streams</em> of asynchronous values: database updates, location updates, WebSocket messages, user input events. This is where <strong>Kotlin Flow</strong> comes in.</p>
<p>Flow is a cold, reactive stream built on coroutines. "Cold" means the stream producer doesn't run until someone collects it, and each collector gets its own independent instance of the stream. This is in contrast to RxJava's hot observables, which can emit regardless of subscribers and require careful lifecycle management.</p>
<p>The <code>StateFlow</code> and <code>SharedFlow</code> variants provide the hot stream behavior needed for UI state. <code>StateFlow</code> always holds the latest value (like LiveData), while <code>SharedFlow</code> supports multiple subscribers and configurable replay behavior. The combination of regular Flow for data fetching, StateFlow for UI state in ViewModels, and the <code>collectAsStateWithLifecycle()</code> extension in Compose for safely collecting in the UI layer gives you a complete, lifecycle-aware reactive UI architecture.</p>

<h2>Error Handling: The Part Everyone Gets Wrong</h2>
<p>Coroutine error handling has more nuance than most tutorials acknowledge. The key distinction is between <strong>regular coroutines</strong> (launched with <code>launch</code>) and <strong>concurrent decomposition</strong> (using <code>coroutineScope</code> or <code>supervisorScope</code>). In a regular coroutine hierarchy, an unhandled exception in a child cancels the entire parent scope — this is often the correct behavior. But when you explicitly want failure isolation, <code>supervisorScope</code> ensures that a child failure does not cancel siblings or the parent.</p>
<p>In practice, always use <code>try-catch</code> within suspending functions for expected errors, use <code>CoroutineExceptionHandler</code> in top-level coroutine scopes as a last-resort catcher for unexpected failures, and never swallow exceptions silently. Every production coroutine codebase should have a systematic error handling strategy that distinguishes between recoverable errors (show a retry UI), non-recoverable errors (log and report), and cancellation (handle gracefully without logging as an error).</p>

<h2>The Shallow Work Trap for Technical Leaders</h2>
<p>The average knowledge worker checks their communication tools 77 times per day. For technical managers, this number is higher. You have engineers asking for unblocking, product managers seeking status updates, stakeholders requesting estimates, and a continuous stream of Slack notifications that each individually feel urgent and collectively make sustained, focused work nearly impossible.</p>
<p>Cal Newport defined <strong>deep work</strong> as "professional activities performed in a state of distraction-free concentration that push your cognitive capabilities to their limit." For technical managers, this kind of focused work is where the most valuable thinking happens: architectural decisions, strategic planning, difficult performance conversations, and the technical exploration required to remain a credible leader of an engineering team. Yet the nature of management — with its constant interruptions, context switches, and availability expectations — seems structurally incompatible with deep work. This article is about how to resolve that tension.</p>

<h2>The Manager's Dilemma</h2>
<p>Henry Mintzberg's classic research on managerial work found that managers average just 28 minutes on any single activity before being interrupted or switching to something else. More recent studies in software engineering contexts find similarly fragmented patterns. This is not simply a problem of poor discipline — it reflects genuine structural demands of the role. Engineers need access to their manager to make progress. Stakeholders need information to make decisions. The manager's responsiveness is not optional.</p>
<p>The resolution is not to ignore these demands, but to <strong>architect your time intentionally</strong> so that both modes of work — deep, focused thinking and responsive, accessible management — have dedicated, protected space in your calendar. The key insight is that these two modes of work are fundamentally incompatible in the short term, but both necessary in the medium term. You cannot be in both simultaneously, so you must be in each at designated times.</p>

<h2>The Office Hours Model</h2>
<p>The single most impactful structural change most technical managers can make is adopting an <strong>office hours model</strong> for async interruptions. Rather than being continuously available on Slack for ad-hoc questions, you designate specific blocks (typically 30-45 minutes, twice daily — morning and mid-afternoon) where you are fully available for questions, reviews, and unblocking. Outside these windows, non-urgent messages wait for the next office hours block.</p>
<p>The implementation requires clear communication and expectation-setting with your team. The transition period will feel uncomfortable — you will see messages pile up that you would previously have answered immediately. But within two to three weeks, most teams adjust their behavior: they batch their questions, attempt to solve problems independently first (building capability), and escalate only genuinely urgent blockers outside office hours. The result is a dramatic reduction in your context switching while actually improving your team's autonomy and problem-solving ability.</p>
<blockquote>When you are always available, you create a team that is always dependent. When you create structured availability, you create a team that learns to think for itself first — and brings better, more considered questions to you when they do.</blockquote>

<h2>Protecting the Technical Edge</h2>
<p>One of the most common anxieties of technical managers is losing their technical depth. This is a legitimate concern. Studies of engineering career development consistently find that managers who lose their technical credibility within three to five years of moving into management are significantly less effective and have narrower career options.</p>
<p>Maintaining technical relevance as a manager does not require writing production code every day. It requires <em>deliberate, structured technical engagement</em>: allocating a protected weekly block (I recommend 4-6 hours minimum) for technical work that matters to your team's direction. This might be deep-diving into a new technology your team is evaluating, writing a proof-of-concept for a proposed architectural change, conducting a thorough code review of a complex PR, or working through a difficult debugging session alongside a junior engineer. The goal is not productivity — it is the maintenance of technical judgment and the credibility that comes from authentic engagement with the craft.</p>

<h2>The Weekly Planning Ritual</h2>
<p>High-performing technical managers consistently employ a structured weekly planning ritual that separates their work into clear categories. The system that works best is a three-tier categorization: <strong>Deep Work blocks</strong> (strategic thinking, technical exploration, difficult writing), <strong>Operational blocks</strong> (1:1s, standups, planning ceremonies, code review), and <strong>Slack/Response time</strong> (the office hours model described above). Every Sunday evening or Monday morning, map these categories onto the coming week before the week fills itself in reactively. This single practice — planning your time proactively rather than reactively — is the highest-leverage habit available to any technical manager who wants to operate at their true capacity.</p>

const AIChatbot=()=>{
    const [isOpen,setIsOpen]=useState(false);
    const [messages,setMessages]=useState([{role:'bot',text:"Hi! 👋 I'm HAI — Hammad's AI assistant. Ask me anything about his skills, projects, or experience!"}]);
    const [suggestions,setSuggestions]=useState(()=>pickSuggestions());
    const [input,setInput]=useState('');
    const [isLoading,setIsLoading]=useState(false);
    const [showNotif,setShowNotif]=useState(true);
    const messagesEndRef=useRef(null);
    const inputRef=useRef(null);
    useEffect(()=>{if(isOpen){setShowNotif(false);setTimeout(()=>inputRef.current?.focus(),300);}},[isOpen]);
    useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:'smooth'});},[messages,isLoading]);
    const sendMessage=async(text)=>{
        const userText=(text||input).trim();if(!userText||isLoading)return;
        setInput('');const cur=messages;
        setMessages(p=>[...p,{role:'user',text:userText}]);setIsLoading(true);
        try{
            const history=[{role:'system',content:SYSTEM_PROMPT}];
            cur.filter((_,i)=>i>0).forEach(m=>history.push({role:m.role==='bot'?'assistant':'user',content:m.text}));
            history.push({role:'user',content:userText});
            const r=await fetch('https://hammad-chat.hammadnawaz35.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});
            const d=await r.json();
            if(!r.ok)setMessages(p=>[...p,{role:'bot',text:`❌ ${d?.error?.message||'Server error.'}`}]);
            else{setMessages(p=>[...p,{role:'bot',text:d?.choices?.[0]?.message?.content||"Couldn't get response."}]);setSuggestions(pickSuggestions([userText]));}
        }catch(e){setMessages(p=>[...p,{role:'bot',text:`❌ Network error: ${e.message}`}]);}
        finally{setIsLoading(false);}
    };
    const handleKeyDown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};
    const lastMsg=messages[messages.length-1];
    const showSugg=!isLoading&&lastMsg?.role==='bot';
    return(
        <>
        <AnimatePresence>
            {isOpen&&(
                <motion.div initial={{opacity:0,y:20,scale:.92}} animate={{opacity:1,y:0,scale:1}} exit={{opacity:0,y:20,scale:.92}} transition={{type:'spring',stiffness:350,damping:28}} className="chat-panel">
                    <div className="chat-header">
                        <div className="chat-avatar">🤖</div>
                        <div className="chat-header-info"><div className="chat-header-name">Hammad's AI Assistant</div><div className="chat-header-status"><span className="status-dot"/>Online</div></div>
                        <button onClick={()=>setIsOpen(false)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',width:28,height:28,borderRadius:'50%',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>✕</button>
                    </div>
                    <div className="chat-messages">
                        {messages.map((msg,i)=><motion.div key={i} initial={{opacity:0,y:8}} animate={{opacity:1,y:0}} transition={{duration:.25}} className={`chat-bubble ${msg.role}`}>{msg.text}</motion.div>)}
                        {isLoading&&<motion.div initial={{opacity:0,y:8}} animate={{opacity:1,y:0}} className="chat-bubble bot loading"><div className="typing-dots"><span/><span/><span/></div></motion.div>}
                        <div ref={messagesEndRef}/>
                    </div>
                    {showSugg&&(<div className="pinned-questions"><div className="pinned-label">✦ You might also ask</div>{suggestions.map((q,i)=><motion.button key={q} initial={{opacity:0,x:-8}} animate={{opacity:1,x:0}} transition={{delay:i*.06}} className="pinned-question-btn" onClick={()=>sendMessage(q)}>{q}</motion.button>)}</div>)}
                    <div className="chat-input-area">
                        <textarea ref={inputRef} className="chat-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKeyDown} placeholder="Ask me anything about Hammad..." rows={1} disabled={isLoading}/>
                        <button className="chat-send-btn" onClick={()=>sendMessage()} disabled={!input.trim()||isLoading}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
                    </div>
                </motion.div>
            )}
        </AnimatePresence>
        <motion.button className={`chat-toggle-btn ${isOpen?'open':''}`} onClick={()=>setIsOpen(!isOpen)} whileTap={{scale:.92}}>
            <AnimatePresence mode="wait">
                {isOpen?(<motion.span key="close" initial={{rotate:-90,opacity:0}} animate={{rotate:0,opacity:1}} exit={{rotate:90,opacity:0}} transition={{duration:.2}} style={{fontSize:22}}>✕</motion.span>):(<motion.span key="open" initial={{rotate:90,opacity:0}} animate={{rotate:0,opacity:1}} exit={{rotate:-90,opacity:0}} transition={{duration:.2}} style={{fontSize:24}}>💬</motion.span>)}
            </AnimatePresence>
            {showNotif&&!isOpen&&<div className="chat-notification-dot"/>}
        </motion.button>
        </>
    );
};

/* ── APP ── */
const App=()=>{
    const{theme,palette,setPalette,toggleTheme}=useTheme();
    return(
        <>
        <div className="animated-bg"/>
        <div className="relative z-10">
            <Navigation theme={theme} toggleTheme={toggleTheme}/>
            <PalettePicker palette={palette} setPalette={setPalette}/>
            <ScrollButton/>
            <Hero/>
            <About/>
            <Skills/>
            <Experience/>
            <Projects/>
            <Contact/>
            <QuoteRotator/>
            <BlogsSection theme={theme}/>
            <Footer/>
        </div>
        <AIChatbot/>
        </>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
